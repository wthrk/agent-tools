# agent-tools configuration
config_version: 1

# Skills to auto-deploy to ~/.claude/skills/
auto_deploy_skills:
  - searching-skills
  - creating-skills
  - jj
  - managing-agents-md
  - responding-copilot-reviews
  - reviewing

# Manage ~/.claude/settings.json (link to ~/.agent-tools/settings.json)
manage_settings: true

# Manage ~/.claude/plugins/ (link to ~/.agent-tools/plugins/)
manage_plugins: false

# Manage ~/.claude/CLAUDE.md (link to ~/.agent-tools/global/CLAUDE.md)
manage_claude_md: true

# Manage ~/.claude/hooks/ (link to ~/.agent-tools/global/hooks/)
manage_hooks: true

# Manage ~/.codex/config.toml (link to ~/.agent-tools/codex/config.toml)
manage_codex_config: true

# Claude MCP servers to register via `claude mcp add-json -s user`
# These are synced declaratively: defined servers are added/updated,
# servers not listed here are left untouched.
claude_mcp_servers:
  serena:
    type: stdio
    command: uvx
    args:
      - "--from"
      - "git+https://github.com/oraios/serena"
      - serena
      - start-mcp-server
      - "--enable-web-dashboard=false"
