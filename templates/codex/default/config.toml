# === Core Model ===
model = "gpt-5.3-codex"
model_reasoning_effort = "medium"
model_reasoning_summary = "auto"
personality = "pragmatic"

# === Security ===
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "cached"

# === Documentation ===
project_doc_max_bytes = 65536

# === Profile ===
profile = "daily"

# === Projects ===
# Keep project trust entries in ~/.codex/config.local.toml (environment-specific).

# === MCP Servers ===
[mcp_servers.serena]
command = "uvx"
args = ["--from", "git+https://github.com/oraios/serena", "serena", "start-mcp-server", "--enable-web-dashboard=false"]

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp@latest"]

# === Sandbox ===
[sandbox_workspace_write]
network_access = false

# === Shell Environment ===
[shell_environment_policy]
inherit = "core"
exclude = ["AWS_*", "AZURE_*", "SECRET_*", "TOKEN_*", "OPENAI_API_KEY"]

# === Notice ===
[notice]
hide_gpt5_1_migration_prompt = true
"hide_gpt-5.1-codex-max_migration_prompt" = true

[notice.model_migrations]
"gpt-5.1-codex-max" = "gpt-5.2-codex"
"gpt-5.2-codex" = "gpt-5.3-codex"

# === Features ===
[features]
multi_agent = true
prevent_idle_sleep = true

# === Profiles ===
[profiles.daily]
model_reasoning_effort = "medium"

[profiles.deep]
model_reasoning_effort = "xhigh"
sandbox_mode = "read-only"

[profiles.quick]
model = "gpt-5.3-codex-spark"
model_reasoning_effort = "low"

# === Agents ===
[agents]
max_threads = 12

[agents.explorer]
description = "Codebase research agent. Use for all code investigation, no edits."
config_file = "agents/explorer.toml"

[agents.worker]
description = "Coding and bug fix agent. Use for implementation, refactoring, and running tests."
config_file = "agents/worker.toml"

[agents.fast_worker]
description = "Fast scoped implementation agent."
config_file = "agents/fast_worker.toml"

[agents.reviewer]
description = "Code review agent. Finds security risks, error handling gaps, and correctness issues."
config_file = "agents/reviewer.toml"
